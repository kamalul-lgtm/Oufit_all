<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit All</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">

        <div class="logo-text">
            OUTFIT ALL
        </div>

        <!-- <div class="menu">
            <a href="#">Beranda</a>
            <a href="#">Kategori</a>
            <a href="#">Produk</a>
            <a href="#">Tentang</a>
        </div> -->

    </nav>

    <!-- ===== HEADER ===== -->
    <header class="hero">

        <img src="images/logo.jpeg" class="logo" alt="Logo Outfit All">

        <h1>OUTFIT ALL</h1>

        <p>Temukan Outfit Favoritmu</p>

    </header>

    <!-- ===== BANNER ===== -->
    <!-- <section class="banner">

        <img src="images/banner.png" alt="Banner">
        <img src="images/banner.jpg" alt="Banner">
        <img src="images/banner.webp" alt="Banner">

    </section> -->

    <!-- ===== SEARCH ===== -->
    <section class="search-box">

        <input
            type="text"
            id="search"
            placeholder="🔍 Cari Nomor Produk..."
        >

    </section>

    <!-- ===== KATEGORI ===== -->

    <section class="kategori">
        <button class="active" data-category="Semua">Semua</button>
        <button data-category="Jaket">🧥 Jaket</button>
        <button data-category="Kemeja">👔 Kemeja</button>
        <button data-category="Kaos">👕 Kaos</button>
        <button data-category="Celana">👖 Celana</button>
        <button data-category="Sepatu">👟 Sepatu</button>
        <button data-category="Fashion Wanita">👗 Fashion Wanita</button>
        <button data-category="Tas">👜 Tas</button>
        <!-- <button data-category="Aksesoris">⌚ Aksesoris</button> -->
    </section>
    <!-- ===== DAFTAR PRODUK ===== -->
    <section class="products">

        <!-- Produk akan dibuat otomatis oleh JavaScript -->

    </section>

    <script src="script.js"></script>

</body>
